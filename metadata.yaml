name: astrbot_plugin_mocode
desc: 🚀 Mocode - 基于 AstrBot 本地沙箱的代码执行插件，无需 Docker，即装即用！支持 Python 代码安全运行。
help: |
  🚀 Mocode 代码运行器 (v1.0.0) - 基于 AstrBot 本地沙箱

  💡 核心亮点：深度集成 AstrBot LocalPythonTool 沙箱，零配置，即装即用！

  【使用格式】
  /code [语言] [输入(可选)]
  [代码]

  【示例 1】Hello World
  /code py
  print("Hello, World!")

  【示例 2】带输入
  /code py 你好，AstrBot！
  message = input()
  print(f"你说: {message}")

  【示例 3】数学计算
  /code py
  result = sum(range(101))
  print(f"1+2+...+100 = {result}")

  【支持的语言】
  ✅ Python (py/python)
  ⏳ JavaScript (js) - 计划中
  ⏳ Bash (sh) - 计划中

  【安全特性】
  🔒 使用 AstrBot 原生沙箱执行
  🛡️ 子进程隔离
  ⏱️ 超时控制（默认 30 秒）
  🚫 自动拦截危险命令
  📁 文件系统访问限制

  【配置项】
  - admin_only: 是否仅管理员可用（默认 false）
  - timeout_seconds: 执行超时时间（默认 30 秒）

  📖 详细文档：https://github.com/NumInvis/astrbot_plugin_Mocode
version: "1.0.0"
author: NumInvis
